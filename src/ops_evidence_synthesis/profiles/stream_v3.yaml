  },
  "operational_contract": {
    "expected_normal": [
      "watchdog_ok should not coexist with stream_service_substate=dead without an explicit recovery transition.",
      "stream_transport_count and active_stream_count dropping to zero are suspicious, not healthy.",
      "youtube_health_count, connection_reset_count, warning_count, and runtime_restart_count dropping to zero are usually monitor-only unless paired with missing output or state evidence."
    ],
    "failure_indicators": [
      "RTMPS/ffmpeg process or send-path evidence disappears during an incident window.",
      "YouTube watchdog or ingest status contradicts systemd stream service substate.",
      "Chromium capture freshness or audio energy gaps coincide with transport disappearance.",
      "Recovery loops repeatedly restart or mask service state."
    ],
    "non_critical_noise": [
      "PulseAudio D-Bus warnings without audio_energy gap evidence.",
      "Chromium warnings without capture freshness or output impact.",
      "Stable zero connection resets, warnings, or YouTube health failures."
    ]
  },
