    "system_type": "livestream_pipeline",
    "purpose": "Keep browser capture, audio, ffmpeg, RTMPS transport, and YouTube ingest aligned for continuous streaming.",
    "critical_user_outcomes": [
      "YouTube ingest remains live and watchable.",
      "ffmpeg/RTMPS send path remains active.",
      "Capture freshness and audio energy do not silently disappear.",
      "Health contracts do not mark the service healthy while the supervised stream state is dead."
