  "component_map": {
    "youtube_health": "YouTube ingest, watchdog, public/API/OAuth health, same URL, and active stream observations.",
    "rtmps_ffmpeg": "FFmpeg process, RTMPS socket, TCP send samples, Mbps, notsent, unacked, lastsnd, and send-path progress.",
    "chromium_capture": "Browser capture, x11grab, ADS-B rendering, overlay, and capture freshness.",
    "audio_energy": "Audio route, Pulse sink/source, audio_ok, audio_fault_count, and audio energy evidence.",
    "runtime_recovery": "k3s deployment/pod readiness, remote recovery timer, systemd monitor loop, watchdog, restarts, and historical recovery.",
    "network_transport": "Arena-side route/DNS/TCP/connectivity and FFmpeg socket observer evidence.",
    "resource_pressure": "Runtime and host memory, PSI, major faults, swap, and resource guardrail evidence.",
    "observability_contract": "Exporter freshness, health/objective snapshots, watchdog all-ok surface, and evidence completeness."
  },
  "known_benign_noise": [
    "Local adsb-streamnew-youtube-stream.service inactive/dead when k3s runtime is healthy.",
    "Chromium crashpad, DBus, or GPU warnings without capture freshness or rendering impact.",
    "PulseAudio startup/config warnings when stream_v3_sink.monitor exists and audio_ok is true.",
    "historical_degraded=true with current_fail=0 and current primary evidence OK.",
    "connection_reset_count, warning_count, runtime_restart_count, rtmps_ssl_tls_count, or ffmpeg_restart_incident_clusters equals 0 by itself."
  ],
  "action_constraints": [
    "Do not infer actual YouTube viewer continuity unless YouTube public/API/OAuth/ingest evidence is present.",
    "Do not cite profile context as support evidence.",
    "Do not treat local adsb-streamnew-youtube-stream.service dead state as runtime failure when k3s runtime positive evidence is healthy.",
    "Split YouTube, RTMPS/FFmpeg, Chromium/rendering, audio, network, resource, runtime recovery, and observability hypotheses by subsystem.",
    "Treat failure absence counts as monitor_only unless paired with positive liveness evidence."
  ],
  "review_policy": {
    "context_is_not_evidence": true,
    "require_evidence_id_for_support": true,
    "zero_is_bad_metrics": [
      "stream_transport_count",
      "audio_energy_count",
      "capture_freshness_count",
      "runtime_ffmpeg_present",
      "network_ffmpeg_socket_connected",
      "youtube_ingest_connected",
      "audio_evidence_available",
      "adsb_evidence_available"
    ],
    "zero_is_good_metrics": [
      "connection_reset_count",
      "warning_count",
      "runtime_restart_count",
      "rtmps_ssl_tls_count",
      "ffmpeg_restart_incident_clusters",
      "audio_fault_count",
      "notify_active_incidents"
    ],
    "zero_is_neutral_metrics": [
      "stream_service_substate_dead_on_arena",
      "fast_mode_active",
      "api_cost_burn_rate_active",
      "historical_degraded"
    ]
  },
  "metrics": {
