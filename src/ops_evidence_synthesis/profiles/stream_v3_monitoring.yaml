{
  "profile_id": "stream_v3_monitoring",
  "profile_label": "stream_v3 arena-server monitoring profile",
  "source_system": "stream_v3_monitoring",
  "system_profile": {
    "system_name": "stream_v3",
    "system_type": "streaming_runtime_monitoring",
    "environment": "arena_server",
    "owner_context": "personal_home_lab",
    "purpose": "Monitor and control the k3s-owned stream_v3 YouTube Live pipeline from arena-server.",
    "critical_user_outcomes": [
      "YouTube live stream remains online and watchable.",
      "RTMPS send path stays active.",
      "Audio continues.",
      "Video capture stays fresh.",
      "Monitoring/exporter surfaces remain fresh enough to judge runtime health."
    ],
    "profile_scope": "arena-server monitoring/control layer evidence for stream_v3."
  },
  "operational_contract": {
    "expected_normal": [
      "stream-v3-runtime Pod is Running and all runtime containers are ready.",
      "stream-engine FFmpeg exists and RTMPS socket or fresh TCP send sample exists.",
      "YouTube watchdog reports local_ok, public_ok, api_ok, oauth_ok, ingest_connected, and stream_active.",
      "Audio evidence is available, Pulse sink/source exist, audio_ok is true, and audio_fault_count is 0.",
      "ADS-B/rendering evidence is available, messages and positions are moving.",
      "exporter_up, monitoring_watchdog_all_ok, health snapshots, and objective snapshots are fresh.",
      "Local adsb-streamnew-youtube-stream.service may be dead when k3s runtime owns streaming."
    ],
    "failure_indicators": [
      "Runtime Pod is not ready, container restarts are rising, or runtime heartbeat is stale.",
      "runtime_ffmpeg_present is 0, ingest_connected is 0, or network_ffmpeg_socket_connected is 0 without a fresh TCP sample.",
      "Upload sample is stale, Mbps is low with notsent/unacked/lastsnd pressure, tcp_stall, network_down, or low_upload_pressure appears.",
      "youtube_watchdog_healthy is 0, fail_count rises, or same_url_live is false with corroborating evidence.",
      "audio_ok is 0, audio_fault_count is greater than 0, Pulse source is missing, or confirmed audio_energy_low appears.",
      "ADS-B evidence is missing/stale, messages or positions stop moving, black frame appears, or overlay is unavailable.",
      "current_fail is 1, notify_active_incidents is greater than 0, or a recovery action is executable."
    ],
    "non_critical_noise": [
      "Chromium crashpad, DBus, or GPU warnings when Chromium, FFmpeg x11grab, runtime heartbeat, and rendering metrics are OK.",
      "PulseAudio startup/config warnings when stream_v3_sink.monitor exists and audio_ok is true.",
      "historical_degraded=true with current_fail=0 and current primary evidence OK.",
      "connection_reset_count, warning_count, or runtime_restart_count equals 0; absence of failure is not positive support evidence.",
      "Local adsb-streamnew-youtube-stream.service dead state is neutral when k3s runtime positive evidence is healthy."
    ]
  },
  "log_sources": [
    {
      "source_name": "prometheus_stream_v3_exporter",
      "source_type": "prometheus_metrics",
      "meaning": "Current synthesized health, transport, YouTube, audio, ADS-B, memory, and monitoring state.",
      "reliability": "high",
      "collection_command": "curl -fsS http://127.0.0.1:9108/metrics | grep '^stream_v3_'",
      "typical_fields": ["metric_name", "labels", "value"],
      "caveats": ["cached_240s", "snapshot_age_must_be_checked"]
    },
    {
      "source_name": "k8s_runtime_status",
      "source_type": "kubernetes_api",
      "meaning": "Runtime deployment, pod, container readiness, and restart counts.",
      "reliability": "high",
      "collection_command": "kubectl -n stream-v3 get deploy,pod -o wide",
      "typical_fields": ["pod", "container", "ready", "restartCount", "state"],
      "caveats": ["pod_ready_is_not_media_plane_proof"]
    },
    {
      "source_name": "remote_runtime_state",
      "source_type": "json_state",
      "meaning": "Mirrored runtime heartbeat and FFmpeg identity.",
      "reliability": "high",
      "collection_command": "read selected keys from .state/arena-monitor/stream_runtime_state_remote.json",
      "typical_fields": ["updated_at_utc", "status", "ffmpeg_pid", "restart_count", "last_health_ok"],
      "caveats": ["stale_mirror_is_inconclusive"]
    },
    {
      "source_name": "fast_recovery_events",
      "source_type": "jsonl",
      "meaning": "RTMPS TCP samples, low upload, network_down, tcp_stall, and restart decisions.",
      "reliability": "high",
      "collection_command": "tail -n 200 .state/arena-monitor/logs/fast_recovery_events.jsonl",
      "typical_fields": ["ts_utc", "kind", "trigger", "mbps", "notsent", "unacked", "lastsnd_ms", "bytes_sent_delta"],
      "caveats": ["failure_counts_zero_are_not_liveness_proof"]
    },
    {
      "source_name": "youtube_watchdog_stats",
      "source_type": "json_state_and_jsonl",
      "meaning": "YouTube local/public/API/OAuth/ingest health and same-URL evidence.",
      "reliability": "high",
      "collection_command": "read selected non-secret keys from youtube_watchdog_stats.json and logs/youtube_watchdog.jsonl",
      "typical_fields": ["healthy", "local_ok", "public_ok", "api_ok", "oauth_ok", "ingest_connected", "stream_active", "fail_count"],
      "caveats": ["API_unknown_or_quota_guard_is_not_automatically_stream_outage"]
    },
    {
      "source_name": "stream_watchdog_state",
      "source_type": "json_state_and_jsonl",
      "meaning": "Runtime watchdog, audio, Pulse, rendering, and remote k8s probe summary.",
      "reliability": "medium",
      "collection_command": "read stream_watchdog_stats.json and logs/watchdog_state_timeline.jsonl",
      "typical_fields": ["status", "judgment", "reason", "runtime_snapshot_age_sec", "stream_service_substate"],
      "caveats": ["local_stream_service_dead_can_be_expected_in_k8s_mode"]
    },
    {
      "source_name": "network_observer",
      "source_type": "json_state_and_journal",
      "meaning": "Arena-side route, DNS, TCP, and connectivity classification.",
      "reliability": "medium",
      "collection_command": "read network_observer_latest.json; journalctl -u adsb-streamnew-network-observer.service -n 20",
      "typical_fields": ["classification.status", "cause_layer", "tcp_connect_ipv4.ok", "tcp_connect_ipv6.ok", "ffmpeg_socket"],
      "caveats": ["arena_host_observer_may_not_see_runtime_socket_directly"]
    },
    {
      "source_name": "systemd_units_and_timers",
      "source_type": "systemd",
      "meaning": "Monitoring/control service ownership, timer freshness, and restart policy.",
      "reliability": "medium",
      "collection_command": "systemctl show <unit> -p ActiveState -p SubState -p UnitFileState; systemctl cat <unit> | sed '<redact>'",
      "typical_fields": ["ActiveState", "SubState", "ExecStart", "EnvironmentFile", "Restart", "OnUnitActiveSec"],
      "caveats": ["do_not_use_raw_status_when_process_args_may_contain_RTMPS_URL"]
    }
  ],
  "runtime_ownership": {
    "primary_runtime": "kubernetes:stream-v3/stream-v3-runtime",
    "arena_monitor_host": "arena-server",
    "legacy_local_stream_unit": "adsb-streamnew-youtube-stream.service",
    "legacy_local_stream_unit_expected_state_when_k8s_owned": "inactive_or_disabled"
  },
  "primary_positive_evidence": {
    "stream_transport": {
      "zero_semantics": "zero_is_bad_for_positive_evidence_count",
      "sources": ["stream_v3_runtime_ffmpeg_present", "stream_v3_network_ffmpeg_socket_connected", "stream_v3_upload_latest_mbps", "fast_recovery_events"]
    },
    "youtube_live": {
      "zero_semantics": "zero_is_bad_for_required_boolean",
