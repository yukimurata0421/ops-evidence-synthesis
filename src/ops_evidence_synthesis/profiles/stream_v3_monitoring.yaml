    },
    "runtime_readiness": {
      "sources": ["kubectl_runtime_container_ready", "stream_v3_runtime_memory_sample_available", "stream_runtime_state_remote"]
    }
  },
  "failure_absence_evidence": {
    "monitor_only_if_alone": [
      "connection_reset_count",
      "warning_count",
      "runtime_restart_count",
      "rtmps_ssl_tls_count",
      "ffmpeg_restart_incident_clusters"
    ]
  },
  "classification_overrides": [
    {
      "id": "arena_local_stream_dead_under_k8s_runtime",
      "when": {
        "stream_service_substate": "dead",
        "watchdog_ok": true,
        "runtime_owner": "kubernetes",
        "required_positive_evidence": ["runtime_pod_ready", "runtime_ffmpeg_present", "youtube_ingest_connected"]
      },
      "classify_as": "non_critical_noise",
      "note": "Local arena systemd stream unit is not the runtime owner."
    },
    {
      "id": "historical_degraded_with_current_ok",
      "when": {
        "current_fail": 0,
        "historical_degraded": 1,
        "required_positive_evidence": ["youtube_live_ok", "rtmps_send_path_ok", "audio_ok"]
      },
      "classify_as": "historical_event"
    }
  ],
  "support_evidence_requirements": {
    "required_fields": ["evidence_id", "source_name", "collected_at_utc", "observed_value"],
    "rule": "Profile context may guide classification but must never be emitted as support evidence."
  },
