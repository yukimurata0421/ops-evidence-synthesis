<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Ops Evidence Synthesis title card</title>
  <desc id="desc">Opening title that defines OES and the stream_v3 target system.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071426"/>
      <stop offset="0.55" stop-color="#102b4d"/>
      <stop offset="1" stop-color="#0b5f68"/>
    </linearGradient>
    <style>
      .sans{font-family:Inter,"Noto Sans JP",Arial,sans-serif}.mono{font-family:"IBM Plex Mono",Consolas,monospace}
    </style>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="1610" cy="160" r="340" fill="#4fd1c5" opacity=".08"/>
  <circle cx="1720" cy="920" r="430" fill="#60a5fa" opacity=".08"/>
  <rect x="112" y="104" width="104" height="104" rx="24" fill="#4fd1c5"/>
  <text x="164" y="174" text-anchor="middle" class="sans" font-size="42" font-weight="900" fill="#071426">OE</text>
  <text x="112" y="326" class="sans" font-size="82" font-weight="850" fill="#f8fafc">Ops Evidence Synthesis</text>
  <text x="112" y="398" class="sans" font-size="42" font-weight="700" fill="#8be3dc">OES · SRE向け Evidence-grounded DevOps Incident Review Agent</text>
  <text x="112" y="512" class="sans" font-size="34" font-weight="650" fill="#d8e7f5">AIの回答を、SREが判断できる証拠付きレビューへ変換する</text>
  <rect x="112" y="630" width="1696" height="258" rx="26" fill="#ffffff" opacity=".08" stroke="#ffffff" stroke-opacity=".18"/>
  <text x="160" y="696" class="mono" font-size="24" font-weight="700" fill="#8be3dc">PRIMARY DEMO TARGET</text>
  <text x="160" y="768" class="sans" font-size="52" font-weight="850" fill="#ffffff">stream_v3 · 24/7 YouTube Live 配信システム</text>
  <text x="160" y="828" class="sans" font-size="30" font-weight="600" fill="#cbdbea">ADS-B航空機データの映像と番組音声を継続配信</text>
  <text x="112" y="990" class="sans" font-size="30" font-weight="800" fill="#f8fafc">5つのAIで解析しても、証拠がなければ原因にしない。</text>
</svg>
