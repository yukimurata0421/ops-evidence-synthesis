<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Ops Evidence Synthesis end card</title>
  <desc id="desc">Closing statement for the hackathon demo.</desc>
  <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071426"/><stop offset="1" stop-color="#064e3b"/></linearGradient><style>.sans{font-family:Inter,"Noto Sans JP",Arial,sans-serif}.mono{font-family:"IBM Plex Mono",Consolas,monospace}</style></defs>
  <rect width="1920" height="1080" fill="url(#g)"/>
  <text x="960" y="215" text-anchor="middle" class="mono" font-size="28" font-weight="750" fill="#67e8f9">OPS EVIDENCE SYNTHESIS · OES</text>
  <text x="960" y="380" text-anchor="middle" class="sans" font-size="70" font-weight="900" fill="#fff">AIに原因を当てさせるのではなく、</text>
  <text x="960" y="480" text-anchor="middle" class="sans" font-size="70" font-weight="900" fill="#8be3dc">原因と呼べる証拠を集めさせる。</text>
  <rect x="270" y="610" width="1380" height="170" rx="28" fill="#fff" opacity=".08" stroke="#fff" stroke-opacity=".2"/>
  <text x="960" y="675" text-anchor="middle" class="sans" font-size="30" font-weight="800" fill="#fff">Gemini Enterprise Agent Platform · Cloud Build · Cloud Run</text>
  <text x="960" y="728" text-anchor="middle" class="sans" font-size="27" fill="#cbd5e1">SHA-fixed Evidence · Missing Evidence Request · Human-gated Action</text>
  <text x="960" y="920" text-anchor="middle" class="sans" font-size="35" font-weight="850" fill="#f8fafc">5つのAIで解析しても、証拠がなければ原因にしない。</text>
</svg>
