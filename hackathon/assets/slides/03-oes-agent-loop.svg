<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">OES guarded agent loop</title>
  <desc id="desc">Agent tools freeze evidence, cross-check providers, validate citations, create review targets, request evidence, and stop at a human gate.</desc>
  <defs>
    <style>.sans{font-family:Inter,"Noto Sans JP",Arial,sans-serif}.mono{font-family:"IBM Plex Mono",Consolas,monospace}.arrow{stroke:#64748b;stroke-width:5;fill:none;marker-end:url(#a)}</style>
    <marker id="a" markerWidth="14" markerHeight="12" refX="13" refY="6" orient="auto"><path d="M0 0L14 6L0 12Z" fill="#64748b"/></marker>
  </defs>
  <rect width="1920" height="1080" fill="#f8fafc"/>
  <text x="100" y="112" class="mono" font-size="24" font-weight="750" fill="#0f766e">OES AGENT TRACE</text>
  <text x="100" y="190" class="sans" font-size="64" font-weight="850" fill="#0f172a">Guarded Autonomy</text>
  <text x="100" y="240" class="sans" font-size="28" fill="#475569">調査・比較・証拠要求はAgent、最終原因と運用操作はHuman Gate</text>

  <g class="sans" text-anchor="middle">
    <rect x="90" y="350" width="300" height="180" rx="24" fill="#e6f6f3" stroke="#0f766e" stroke-width="3"/>
    <text x="240" y="418" font-size="29" font-weight="800" fill="#134e4a">Freeze Evidence</text><text x="240" y="462" class="mono" font-size="18" fill="#0f766e">SHA-fixed bundle</text>
    <rect x="450" y="350" width="300" height="180" rx="24" fill="#eaf2ff" stroke="#2563eb" stroke-width="3"/>
    <text x="600" y="408" font-size="29" font-weight="800" fill="#1e3a8a">Cross-check</text><text x="600" y="451" font-size="23" fill="#334155">Gemini-led providers</text><text x="600" y="486" class="mono" font-size="18" fill="#2563eb">claimed / silent / conflict</text>
    <rect x="810" y="350" width="300" height="180" rx="24" fill="#f1ecfb" stroke="#7c3aed" stroke-width="3"/>
    <text x="960" y="408" font-size="29" font-weight="800" fill="#4c1d95">Validate</text><text x="960" y="451" font-size="23" fill="#334155">schema + citations</text><text x="960" y="486" class="mono" font-size="18" fill="#7c3aed">Evidence IDs required</text>
    <rect x="1170" y="350" width="300" height="180" rx="24" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/>
    <text x="1320" y="408" font-size="29" font-weight="800" fill="#9a3412">Review Targets</text><text x="1320" y="451" font-size="23" fill="#334155">priority + blockers</text><text x="1320" y="486" class="mono" font-size="18" fill="#ea580c">not truth probability</text>
    <rect x="1530" y="350" width="300" height="180" rx="24" fill="#fef2f2" stroke="#e11d48" stroke-width="3"/>
    <text x="1680" y="408" font-size="29" font-weight="800" fill="#881337">Request Evidence</text><text x="1680" y="451" font-size="23" fill="#334155">missing evidence plan</text><text x="1680" y="486" class="mono" font-size="18" fill="#e11d48">next investigation</text>
  </g>
  <path class="arrow" d="M390 440H450M750 440H810M1110 440H1170M1470 440H1530"/>

  <rect x="400" y="700" width="1120" height="190" rx="30" fill="#0f172a"/>
  <text x="960" y="770" text-anchor="middle" class="sans" font-size="38" font-weight="850" fill="#fff">Human Gate</text>
  <text x="960" y="825" text-anchor="middle" class="sans" font-size="28" fill="#cbd5e1">最終原因 · restart / rollback · credential change · operational action</text>
  <text x="960" y="862" text-anchor="middle" class="mono" font-size="21" fill="#67e8f9">agent stops and returns auditable review work</text>
  <path d="M1680 530C1680 635 1390 670 1330 700" stroke="#e11d48" stroke-width="5" fill="none" marker-end="url(#a)"/>

  <text x="960" y="1010" text-anchor="middle" class="sans" font-size="32" font-weight="800" fill="#0f766e">不足証拠が届いたら child Evidence Bundle を作り、同じReview Graphを再評価する</text>
</svg>
