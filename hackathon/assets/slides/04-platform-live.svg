<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Fast GCP Review platform path</title>
  <desc id="desc">Cloud Run hosted OES calls Gemini Enterprise Agent Platform API and Gemini 3.1 Flash-Lite.</desc>
  <defs>
    <style>.sans{font-family:Inter,"Noto Sans JP",Arial,sans-serif}.mono{font-family:"IBM Plex Mono",Consolas,monospace}.arrow{stroke:#64748b;stroke-width:6;fill:none;marker-end:url(#a)}</style>
    <marker id="a" markerWidth="14" markerHeight="12" refX="13" refY="6" orient="auto"><path d="M0 0L14 6L0 12Z" fill="#64748b"/></marker>
  </defs>
  <rect width="1920" height="1080" fill="#f4f7fb"/>
  <text x="100" y="112" class="mono" font-size="24" font-weight="750" fill="#2563eb">LIVE GOOGLE CLOUD PATH</text>
  <text x="100" y="190" class="sans" font-size="62" font-weight="850" fill="#0f172a">Fast GCP Review</text>
  <text x="100" y="238" class="sans" font-size="27" fill="#475569">旧Vertex AIという名称ではなく、現在のGemini Enterprise Agent Platformとして説明する</text>

  <rect x="90" y="370" width="430" height="280" rx="28" fill="#fff" stroke="#3b82f6" stroke-width="4"/>
  <text x="305" y="452" text-anchor="middle" class="sans" font-size="38" font-weight="850" fill="#1e3a8a">Cloud Run</text>
  <text x="305" y="510" text-anchor="middle" class="sans" font-size="29" font-weight="700" fill="#0f172a">OES public API</text>
  <text x="305" y="560" text-anchor="middle" class="mono" font-size="21" fill="#2563eb">source-approved-evidence-v2</text>
  <text x="305" y="605" text-anchor="middle" class="mono" font-size="21" fill="#64748b">2,000 sanitized rows</text>

  <rect x="720" y="330" width="520" height="360" rx="28" fill="#0f172a"/>
  <text x="980" y="420" text-anchor="middle" class="sans" font-size="37" font-weight="850" fill="#fff">Gemini Enterprise</text>
  <text x="980" y="467" text-anchor="middle" class="sans" font-size="37" font-weight="850" fill="#fff">Agent Platform API</text>
  <text x="980" y="530" text-anchor="middle" class="sans" font-size="24" fill="#cbd5e1">旧 Vertex AI API</text>
  <text x="980" y="580" text-anchor="middle" class="mono" font-size="20" fill="#67e8f9">publishers/google/models</text>
  <text x="980" y="620" text-anchor="middle" class="mono" font-size="20" fill="#67e8f9">:generateContent</text>

  <rect x="1440" y="370" width="390" height="280" rx="28" fill="#eef2ff" stroke="#7c3aed" stroke-width="4"/>
  <text x="1635" y="445" text-anchor="middle" class="sans" font-size="34" font-weight="850" fill="#4c1d95">Model Garden</text>
  <text x="1635" y="512" text-anchor="middle" class="sans" font-size="32" font-weight="800" fill="#0f172a">Gemini 3.1</text>
  <text x="1635" y="558" text-anchor="middle" class="sans" font-size="32" font-weight="800" fill="#0f172a">Flash-Lite</text>
  <text x="1635" y="608" text-anchor="middle" class="mono" font-size="20" fill="#7c3aed">Google publisher model</text>

  <path class="arrow" d="M520 510H720M1240 510H1440"/>

  <rect x="210" y="800" width="1500" height="122" rx="24" fill="#e6f6f3" stroke="#0f766e" stroke-width="3"/>
  <text x="960" y="853" text-anchor="middle" class="sans" font-size="30" font-weight="850" fill="#134e4a">正しいナレーション</text>
  <text x="960" y="897" text-anchor="middle" class="sans" font-size="27" fill="#134e4a">Cloud Run上のOESが、Agent Platform API経由でGemini 3.1 Flash-Liteを呼び出しています。</text>
</svg>
