<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">stream_v3 delivery system</title>
  <desc id="desc">The primary demo target from ADS-B data and audio through FFmpeg to YouTube Live, monitored by systemd and watchdog.</desc>
  <defs>
    <style>
      .sans{font-family:Inter,"Noto Sans JP",Arial,sans-serif}.mono{font-family:"IBM Plex Mono",Consolas,monospace}
      .box{fill:#fff;stroke:#cbd5e1;stroke-width:3}.arrow{stroke:#64748b;stroke-width:6;fill:none;marker-end:url(#a)}
    </style>
    <marker id="a" markerWidth="14" markerHeight="12" refX="13" refY="6" orient="auto"><path d="M0 0L14 6L0 12Z" fill="#64748b"/></marker>
  </defs>
  <rect width="1920" height="1080" fill="#f3f6fa"/>
  <text x="100" y="112" class="mono" font-size="24" font-weight="750" fill="#0f766e">DEMO TARGET · stream_v3 delivery runtime</text>
  <text x="100" y="184" class="sans" font-size="62" font-weight="850" fill="#0f172a">何を守るシステムなのか</text>
  <text x="100" y="235" class="sans" font-size="28" font-weight="550" fill="#475569">航空機データの映像と音声を、24時間YouTube Liveへ届け続ける</text>

  <rect class="box" x="95" y="360" width="310" height="220" rx="24"/>
  <text x="250" y="435" text-anchor="middle" class="sans" font-size="34" font-weight="800" fill="#0f172a">ADS-B data</text>
  <text x="250" y="485" text-anchor="middle" class="sans" font-size="24" fill="#64748b">航空機の位置・状態</text>
  <text x="250" y="532" text-anchor="middle" class="mono" font-size="20" fill="#0f766e">live source</text>

  <rect class="box" x="520" y="330" width="390" height="280" rx="24"/>
  <text x="715" y="412" text-anchor="middle" class="sans" font-size="34" font-weight="800" fill="#0f172a">映像・音声生成</text>
  <text x="715" y="465" text-anchor="middle" class="sans" font-size="25" fill="#64748b">Browser visualization</text>
  <text x="715" y="510" text-anchor="middle" class="sans" font-size="25" fill="#64748b">Program audio</text>
  <text x="715" y="555" text-anchor="middle" class="mono" font-size="20" fill="#0f766e">fresh visual + audible audio</text>

  <rect class="box" x="1025" y="360" width="310" height="220" rx="24"/>
  <text x="1180" y="435" text-anchor="middle" class="sans" font-size="34" font-weight="800" fill="#0f172a">FFmpeg</text>
  <text x="1180" y="485" text-anchor="middle" class="sans" font-size="24" fill="#64748b">encode / RTMPS</text>
  <text x="1180" y="532" text-anchor="middle" class="mono" font-size="20" fill="#0f766e">continuous transport</text>

  <rect x="1450" y="330" width="370" height="280" rx="24" fill="#fff7ed" stroke="#f59e0b" stroke-width="3"/>
  <text x="1635" y="412" text-anchor="middle" class="sans" font-size="38" font-weight="850" fill="#9a3412">YouTube Live</text>
  <text x="1635" y="465" text-anchor="middle" class="sans" font-size="25" fill="#7c2d12">視聴者が受け取る成果</text>
  <text x="1635" y="515" text-anchor="middle" class="sans" font-size="25" fill="#7c2d12">映像の鮮度・音声・継続性</text>
  <text x="1635" y="558" text-anchor="middle" class="mono" font-size="20" fill="#c2410c">critical user outcome</text>

  <path class="arrow" d="M405 470H520"/><path class="arrow" d="M910 470H1025"/><path class="arrow" d="M1335 470H1450"/>

  <rect x="520" y="710" width="815" height="160" rx="24" fill="#eaf2ff" stroke="#3b82f6" stroke-width="3"/>
  <text x="927" y="772" text-anchor="middle" class="sans" font-size="33" font-weight="800" fill="#1e3a8a">systemd / watchdog</text>
  <text x="927" y="820" text-anchor="middle" class="sans" font-size="25" fill="#334155">状態監視 · 復旧判断 · restart / recovery</text>
  <path d="M715 710V625M1180 710V595" stroke="#3b82f6" stroke-width="5" stroke-dasharray="12 10"/>

  <rect x="95" y="930" width="1725" height="90" rx="20" fill="#0f172a"/>
  <text x="958" y="986" text-anchor="middle" class="sans" font-size="32" font-weight="750" fill="#fff">今回の問い：復旧ログは正常な自己回復か、それとも視聴者影響を伴う障害か？</text>
</svg>
